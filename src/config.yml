# ===================== LadderCountdown 設定（s2e-ladder 専用） =====================
# サーバー起動時に s2e-ladder の countdown をデフォルト(15秒)へ自動リセットするか。
#   true  … 起動のたびに 15 秒へ戻す（配信中に /countdown 30 等で変えても再起動で戻る）
#   false … 変更した秒数を再起動後も保持する（初期値）
# コマンド /countdown autoreset on|off で切り替えると、この値が書き換わります。
# ※ リセット先は 15 秒で固定です。
# ※ Farm 用は別プラグイン FarmCountdown が担当します（本プラグインは s2e-ladder 専用）。
# ==============================================================================
reset-on-start: false
